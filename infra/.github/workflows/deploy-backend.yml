name: 🚀 Deploy Backend → EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

  # Permite disparar manualmente pelo GitHub UI
  workflow_dispatch:

jobs:
  # ── Job 1: Testes e Build ────────────────────────────────────
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build
        working-directory: backend
        run: npm run build

  # ── Job 2: Deploy no EC2 ─────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test-and-build  # só roda se o build passou

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  120s
          script: |
            set -e
            export APP_DIR=$HOME/app
            cd $APP_DIR

            echo "📥 Atualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Instalando e buildando..."
            cd backend
            npm ci --only=production=false
            npm run build

            echo "♻️ Reiniciando API..."
            pm2 restart padaria-api --update-env || \
              pm2 start dist/server.js --name padaria-api
            pm2 save

            echo "🏥 Health check..."
            sleep 3
            curl -sf http://localhost:3333/health || exit 1

            echo "✅ Deploy concluído!"

      - name: Notificar resultado
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deploy realizado com sucesso!"
          else
            echo "❌ Deploy falhou!"
          fi
