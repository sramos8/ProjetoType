name: 🚀 Deploy Backend → EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/app
            git pull origin main
            cd backend
            npm ci
            npm run build
            pm2 restart padaria-api || pm2 start dist/server.js --name padaria-api
            pm2 save